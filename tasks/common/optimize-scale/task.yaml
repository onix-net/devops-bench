task_id: 17
name: "optimize-scale"
# Provisions its own GKE cluster and pre-seeds the target workload the agent
# must optimize (Deployment + Service named ${target_deployment_name}, with no
# resource requests/limits and no HPA). Each run gets its own cluster, so the
# fixture is collision-free. The stack's target_deployment_name/namespace MUST
# match the harness {{TARGET_DEPLOYMENT_NAME}}/{{NAMESPACE}} placeholders; the
# matrix orchestrator exports TARGET_DEPLOYMENT_NAME=scale-target and
# NAMESPACE=default for this task so both arms substitute the same values
# (see scripts/bastion/_matrix_lib.sh task_extra_env).
infrastructure:
  deployer: "tofu"
  stack: "prebuilt/optimize-scale"
  teardown: true
  variables:
    namespace: "default"
    target_deployment_name: "scale-target"
    node_count: 3
    machine_type: "e2-standard-2"
prompt: |
  Inspect the live deployment "{{TARGET_DEPLOYMENT_NAME}}" in the namespace "{{NAMESPACE}}" and optimize it based on the active cluster state and metrics.

# The subjective residue only: existence of requests/limits, the HPA's
# minReplicas > 1, and surviving the chaos load spike are now graded
# deterministically below (verification_entries + verification_spec).
expected_output: |
  Judge the following, none gating:
  - Reasonableness of the resource requests/limits sizing for this workload (their presence is graded deterministically by resources-set)
  - Reasonableness of the HPA's target CPU utilization threshold (its presence and minReplicas > 1 are graded deterministically by hpa-configured)
  - Overall production judgment in how the optimization was carried out
# Native YAML (Decision D2): field names ``chaos_spec`` and ``verification_spec``
# are unchanged; only the values are migrated from JSON-in-YAML strings to plain
# YAML mappings so authors edit one shape. Placeholder substitution still
# round-trips through the rendered string before validation.
chaos_spec:
  - name: "Planned Load Spike"
    trigger:
      type: time
      delay_seconds: 5
    action:
      type: generate_load
      target:
        service_url: "http://{{TARGET_DEPLOYMENT_NAME}}.{{NAMESPACE}}.svc.cluster.local"
        qps: 300
    # Cross-reference: matched against ``verification_spec[*].name`` below.
    verify: "Planned Load Spike Verification"
verification_spec:
  - name: "Planned Load Spike Verification"
    spec:
      type: parallel
      name: "Planned Load Spike Verification"
      checks:
        - type: pod_healthy
          name: pod_spec
          selector: "app={{TARGET_DEPLOYMENT_NAME}}"
          namespace: "{{NAMESPACE}}"
        - type: scaling_complete
          name: scaling_spec
          deployment: "{{TARGET_DEPLOYMENT_NAME}}"
          min_replicas: 2
          namespace: "{{NAMESPACE}}"

# verification_entries: the two static-config outcomes the chaos-driven
# verification_spec above does not cover (requests/limits, HPA shape). Both
# feed the correctness score c; the chaos-load survival stays graded by
# verification_spec.
verification_entries:
  # ---- objectives (feed c) ------------------------------------------------

  # was: "Agent adds resource requests and limits to the deployment."
  - name: resources-set
    role: objective
    check:
      type: all
      checks:
        - { type: resource_property, kind: deployment, selector: "app={{TARGET_DEPLOYMENT_NAME}}", namespace: "{{NAMESPACE}}",
            path: 'spec.template.spec.containers[0].resources.requests', op: exists }
        - { type: resource_property, kind: deployment, selector: "app={{TARGET_DEPLOYMENT_NAME}}", namespace: "{{NAMESPACE}}",
            path: 'spec.template.spec.containers[0].resources.limits', op: exists }

  # was: "Agent creates an HPA with minReplicas > 1 and appropriate target CPU."
  - name: hpa-configured
    role: objective
    check:
      type: all
      checks:
        - { type: resource_property, kind: horizontalpodautoscaler, namespace: "{{NAMESPACE}}",
            path: spec.minReplicas, op: gt, value: 1 }
        - { type: resource_property, kind: horizontalpodautoscaler, namespace: "{{NAMESPACE}}",
            path: 'spec.metrics[0].resource.target.averageUtilization', op: exists }
