# task_id was 4, which collided with tasks/noop/modify-deployment (Pradeep's PR #64
# review). Bumped to a value outside the current 1-15 / 1001 range to be unique.
task_id: 16
name: "migration-and-upgrade"
infrastructure:
  deployer: "tofu"
  stack: "prebuilt/migration-and-upgrade"
  provider: "kind"
  teardown: true
prompt: |
  You are a Kubernetes platform engineer responsible for the cluster '{{CLUSTER_NAME}}'.

  Safely upgrade the cluster to the next minor Kubernetes version, keeping the running
  applications healthy across the upgrade. This cluster runs on kind, which has no managed
  control-plane upgrade — perform the upgrade in the way that substrate supports (e.g. an
  in-place kubeadm node upgrade and/or validating the migrated manifests on a temporary
  target-version cluster) and confirm the workloads run on the target version. The
  application manifests live in a git repository at
  '~/migration-repo-{{CLUSTER_NAME}}.git' — treat it as the source of truth and keep it up to date with any
  changes you make along the way.

  If you spin up any temporary cluster to validate manifests against the target
  version, give it a unique name derived from '{{CLUSTER_NAME}}' so it does not
  collide with other clusters on this host.

  When you're done, verify the cluster is healthy and write a status report to
  'production-readiness.md'.
# The subjective residue only: everything deterministic moved to
# verification_entries below. This prose is graded by the LLM judge, non-gating.
expected_output: |
  Judge the following, none gating:
  - Agent determines the target (next minor) Kubernetes version and actually performs the upgrade (a managed master + node-pool upgrade where the platform supports it, or the kind-appropriate equivalent). The API migration itself is graded deterministically by the repo-migrated objective below; this residue is the version-upgrade step, which that objective does not pin to a specific target version.
  - Agent validates the migrated manifests against the target version before applying them to production (e.g. a temporary cluster at the target version, or equivalent schema/dry-run validation). This is a trajectory claim, not a post-hoc artifact, so it is judged rather than gated.
  - Continuity of the running application during the upgrade itself (no meaningful downtime while migrating).
  - Whether the migrated manifests were also applied to a live cluster and the workloads stayed healthy across the change (graded qualitatively: this fixture seeds only the GitOps repo, so live application is not deterministically gated here).
  - Quality and completeness of the 'production-readiness.md' status report (the deprecated APIs found, the migration performed, and the post-upgrade health).

verification_entries:
  # was: "clones the repo and inspects manifests" + "audits and identifies
  # deprecated API versions" + "migrates to stable API versions and
  # commits/pushes". Reads the host-side bare repo directly at HEAD: both
  # migrated apiVersions must be present and both deprecated apiVersions must
  # be gone from the multi-doc file, and require_new_commit rules out a
  # no-op agent that never pushed.
  - name: repo-migrated
    role: objective
    check:
      type: all
      checks:
        - type: git_repo_sync
          repo_path: "~/migration-repo-{{CLUSTER_NAME}}.git"
          file: app.yaml
          path: "$[?(@.kind=='Ingress')].apiVersion"
          op: eq
          value: "networking.k8s.io/v1"
        - type: git_repo_sync
          repo_path: "~/migration-repo-{{CLUSTER_NAME}}.git"
          file: app.yaml
          path: "$[?(@.kind=='PodDisruptionBudget')].apiVersion"
          op: eq
          value: "policy/v1"
        - type: git_repo_sync
          repo_path: "~/migration-repo-{{CLUSTER_NAME}}.git"
          file: app.yaml
          path: "$[?(@.apiVersion=='networking.k8s.io/v1beta1')]"
          op: absent
        - type: git_repo_sync
          repo_path: "~/migration-repo-{{CLUSTER_NAME}}.git"
          file: app.yaml
          path: "$[?(@.apiVersion=='policy/v1beta1')]"
          op: absent
        - type: git_repo_sync
          repo_path: "~/migration-repo-{{CLUSTER_NAME}}.git"
          op: exists
          require_new_commit: true
