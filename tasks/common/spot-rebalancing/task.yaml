task_id: 22
name: "spot-rebalancing"
# Cost-efficiency rebalancing: migrate fault-tolerant workloads onto Spot
# capacity and rightsize over-provisioned ones, without downtime. Each run
# provisions its own multi-node kind cluster (1 control-plane + 1 on-demand
# worker + 2 Spot workers) pre-seeded with a mixed-criticality fleet and a
# delivered rightsizing report. Spot nodes carry the real GKE Spot label
# ('cloud.google.com/gke-spot=true') + a NoSchedule taint, so the agent's
# actions (tolerations + node affinity) are exactly what they'd be on GKE.
# Parallel-SAFE: kind cluster name is the run-token-prefixed {{CLUSTER_NAME}}
# (Docker nodes per-run unique), the kubeconfig is the per-run $KUBECONFIG, and
# the report host path derives from cluster_name. No GKE quota.
infrastructure:
  deployer: "tofu"
  stack: "prebuilt/spot-rebalancing-kind"
  teardown: true
prompt: |
  You are the platform FinOps engineer for the Kubernetes cluster '{{CLUSTER_NAME}}'.
  Monthly compute spend is too high and needs to come down by roughly 30%.

  The cluster has a mix of node capacity: standard on-demand nodes and cheaper,
  preemptible Spot nodes (labeled 'cloud.google.com/gke-spot=true' and tainted to
  reserve them for workloads that opt in). Today every workload runs on on-demand
  capacity. A rightsizing report has been delivered to
  '~/rightsizing-report-{{CLUSTER_NAME}}.json'.

  Bring the cost down without sacrificing reliability: move the workloads that can
  safely tolerate disruption onto Spot capacity, keep the ones that cannot where
  they are, and rightsize the over-provisioned workloads. Decide which workloads
  are safe to move from their own metadata, and make every change in a way that
  keeps the services available throughout.

  When you are done, write a cost optimization report to 'cost-optimization-report.md'
  for the FinOps team.
# The subjective residue only: everything deterministic moved to
# verification_entries below. This prose is graded by the LLM judge, non-gating.
expected_output: |
  Judge the following, none gating:
  - Quality of cost-optimization-report.md: does it clearly document which workloads moved to Spot and which stayed on-demand with sound reasoning, the rightsizing applied, and a projected cost reduction that meets the ~30% target with sound reasoning? The exact savings figure need not be precise.
  - During the rebalancing and rightsizing rollout, did the workloads stay available throughout (no dropped replicas, no unschedulable or crash-looping pods while pods rescheduled), rather than only the final state being healthy?

verification_entries:
  # ---- objectives (feed c) ------------------------------------------------

  # Spot migration, per batch workload: the toleration for the Spot taint is
  # present on the Deployment's pod template, and a live Ready pod actually
  # carries it. Since only Spot nodes carry the matching NoSchedule taint, a
  # Ready pod with the toleration is scheduler-enforced proof it landed on
  # Spot capacity (a nodeSelector / nodeAffinity is not separately required).
  - name: image-resizer-on-spot
    role: objective
    check:
      type: all
      checks:
        - { type: resource_property, kind: deployment, name: image-resizer, namespace: apps,
            path: "spec.template.spec.tolerations[?(@.key=='cloud.google.com/gke-spot')]", op: exists }
        - { type: pod_healthy, selector: "app=image-resizer", namespace: apps }

  - name: report-builder-on-spot
    role: objective
    check:
      type: all
      checks:
        - { type: resource_property, kind: deployment, name: report-builder, namespace: apps,
            path: "spec.template.spec.tolerations[?(@.key=='cloud.google.com/gke-spot')]", op: exists }
        - { type: pod_healthy, selector: "app=report-builder", namespace: apps }

  - name: log-shipper-on-spot
    role: objective
    check:
      type: all
      checks:
        - { type: resource_property, kind: deployment, name: log-shipper, namespace: apps,
            path: "spec.template.spec.tolerations[?(@.key=='cloud.google.com/gke-spot')]", op: exists }
        - { type: pod_healthy, selector: "app=log-shipper", namespace: apps }

  # Rightsizing: the over-provisioned workloads named in the rightsizing
  # report ('payments-api', 'image-resizer', 'report-builder') must end up
  # below their seeded (over-provisioned) baseline CPU request. 'lt' is now
  # Kubernetes-quantity aware, so this holds for any real reduction rather
  # than requiring an exact match to the recommended value.
  - name: rightsizing-cpu-requests
    role: objective
    weight: 3
    check:
      type: all
      checks:
        - { type: resource_property, kind: deployment, name: payments-api, namespace: apps,
            path: 'spec.template.spec.containers[0].resources.requests.cpu', op: lt, value: "500m" }
        - { type: resource_property, kind: deployment, name: image-resizer, namespace: apps,
            path: 'spec.template.spec.containers[0].resources.requests.cpu', op: lt, value: "500m" }
        - { type: resource_property, kind: deployment, name: report-builder, namespace: apps,
            path: 'spec.template.spec.containers[0].resources.requests.cpu', op: lt, value: "1" }

  # ---- safeguards ---------------------------------------------------------

  # Critical / stateful workloads must never be given the Spot toleration:
  # they must stay pinned to on-demand capacity. The 'workload-tier=critical'
  # label selector matches both 'payments-api' and 'session-store'.
  - name: critical-workloads-not-tolerated
    role: safeguard
    severity: catastrophic
    check:
      type: resource_property
      kind: deployment
      selector: "workload-tier=critical"
      namespace: apps
      path: "spec.template.spec.tolerations[?(@.key=='cloud.google.com/gke-spot')]"
      op: absent

validated: true
