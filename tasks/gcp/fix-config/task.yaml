task_id: 5
name: "fix-config"
infrastructure:
  deployer: "tofu"
  # seed_mode=broken-frontend pre-seeds the hypercomputer-d1-frontend Deployment
  # with USE_GEMINI_API="true" (the misconfiguration). The agent's job is to
  # re-apply the manifest below, which flips USE_GEMINI_API back to "false".
  stack: "prebuilt/hypercomputer-d1"
  teardown: true
  variables:
    seed_mode: "broken-frontend"
    node_count: 3
    machine_type: "e2-standard-4"
prompt: |
  Apply the manifest change to cluster {{GKE_CLUSTER_NAME}} in project {{GCP_PROJECT_ID}}.

  ```
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    labels:
      app: hypercomputer-d1-frontend
    name: hypercomputer-d1-frontend
    namespace: default
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: hypercomputer-d1-frontend
    template:
      metadata:
        labels:
          app: hypercomputer-d1-frontend
      spec:
        automountServiceAccountToken: true
        containers:
        - env:
          - name: APP_VERSION
            value: v1.10
          - name: VLLM_API_URL
            value: http://hypercomputer-d1-vllm-service:8000/v1/chat/completions
          - name: MODEL_NAME
            value: google-gemma-3-12b-it
          - name: USE_GEMINI_API
            value: 'false'
          image: gcr.io/gke-e2e-images/hypercomputer:v1.10
          name: frontend
          ports:
          - containerPort: 8080
            protocol: TCP
        serviceAccount: hypercomputer-d1-vllm-sa
        serviceAccountName: hypercomputer-d1-vllm-sa
  ```
# The subjective residue only: everything deterministic moved to
# verification_entries below. This prose is graded by the LLM judge, non-gating.
expected_output: |
  Judge the following, none gating:
  - The agent explains the root cause (USE_GEMINI_API misconfigured to 'true') and how the applied change fixes it.
  - The change was applied as a minimal, targeted update (e.g. kubectl apply or patch) rather than an unrelated recreate that would cause avoidable Pod churn.

verification_entries:
  # was: "Confirm USE_GEMINI_API is 'false'" + "VLLM_API_URL points at the local
  #      service" + "Validate the agent applied via kubectl rather than just
  #      showing the YAML". Applying is implied: these are live cluster field
  #      reads, so the values can only match if the manifest was actually
  #      applied, not merely displayed.
  - name: config-restored
    role: objective
    check:
      type: all
      checks:
        - { type: resource_property, kind: deployment, name: hypercomputer-d1-frontend, namespace: default,
            path: "spec.template.spec.containers[0].env[?(@.name=='USE_GEMINI_API')].value", op: eq, value: "false" }
        - { type: resource_property, kind: deployment, name: hypercomputer-d1-frontend, namespace: default,
            path: "spec.template.spec.containers[0].env[?(@.name=='VLLM_API_URL')].value", op: eq,
            value: "http://hypercomputer-d1-vllm-service:8000/v1/chat/completions" }