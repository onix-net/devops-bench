---
task_id: 13
name: "lustre-csi-deployment"
infrastructure:
  deployer: "tofu"
  stack: "prebuilt/lustre-csi"
  teardown: true
  variables:
    node_count: 1
    machine_type: "g2-standard-4"
prompt: |
  Deploy a live vLLM inference server for Gemma 4 12B SFP8 onto the GKE cluster
  {{GKE_CLUSTER_NAME}} in project {{GCP_PROJECT_ID}}.
  A Managed Lustre instance named 'lustre-{{GKE_CLUSTER_NAME}}' has been
  pre-provisioned in zone 'us-central1-a'.

  Objectives:
  1. Create a PersistentVolume named `gemma-pv` referencing the pre-provisioned
     Managed Lustre instance `lustre-{{GKE_CLUSTER_NAME}}` in zone
     `us-central1-a` via the Managed Lustre CSI driver. The instance's mount IP
     and filesystem name must be queried from the instance (e.g.
     `gcloud lustre instances describe`).
  2. Create a PVC named `gemma-pvc` referencing `gemma-pv`.
  3. Deploy `gemma-inference-staging` using `nginx:alpine` (simulating serving)
     that:
     - Requests 1 GPU accelerator (`nvidia.com/gpu: 1`).
     - Mounts the Lustre volume at `/models`.
  4. Create a ClusterIP Service named `gemma-service` exposing port 8000.
expected_output: |
  critical requirements:

  - Query the pre-provisioned Managed Lustre instance 'lustre-{{GKE_CLUSTER_NAME}}' in zone us-central1-a (e.g. via 'gcloud lustre instances describe') to obtain its mount IP and filesystem name.
  - Apply a PersistentVolume named gemma-pv backed by the Managed Lustre CSI driver lustre.csi.storage.gke.io, with volumeHandle {{GCP_PROJECT_ID}}/us-central1-a/lustre-{{GKE_CLUSTER_NAME}} and volumeAttributes populated with the queried mount IP and filesystem.
  - Apply a PersistentVolumeClaim named gemma-pvc that statically binds to gemma-pv (volumeName gemma-pv, with a storageClassName consistent with the PV) rather than dynamically provisioning storage.
  - Apply the gemma-inference-staging Deployment using image nginx:alpine, requesting 1 GPU (nvidia.com/gpu: 1) and mounting the gemma-pvc volume at /models.
  - Apply a ClusterIP Service named gemma-service exposing port 8000 and selecting the gemma-inference-staging pods.
  - Confirm that all four resources (the PersistentVolume, PersistentVolumeClaim, Deployment, and Service) were successfully applied to the '{{GKE_CLUSTER_NAME}}' cluster in project '{{GCP_PROJECT_ID}}'.

  Expected Manifest Generated: N/A, not a manifest generation request.

documentation:
  - doc_name: "GKE Managed Lustre CSI Driver Guide (existing instance)"
    url: "https://cloud.google.com/kubernetes-engine/docs/how-to/persistent-volumes/lustre-csi-driver-existing-instance"
    constraints:
      - text: "driver: lustre.csi.storage.gke.io"
        critical: true
      - text: "volumeHandle format: PROJECT_ID/LOCATION/INSTANCE_NAME"
        critical: true
      - text: "volumeAttributes must include ip (from the instance mountPoint) and filesystem"
        critical: true
  - doc_name: "GKE GPU Setup Docs"
    url: "https://docs.cloud.google.com/kubernetes-engine/docs/how-to/gpus"
    constraints:
      - text: "nvidia.com/gpu resource limit of 1"
        critical: true
