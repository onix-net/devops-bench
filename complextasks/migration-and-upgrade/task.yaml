task_id: 4
name: "migration-and-upgrade"
infrastructure:
  deployer: "tofu"
  stack: "prebuilt/migration-and-upgrade"
  teardown: true
prompt: |
  You are a Kubernetes Administrator managing a GKE cluster named '{{GKE_CLUSTER_NAME}}' in project '{{GCP_PROJECT_ID}}'.
  Your primary objective is to safely upgrade the GKE cluster to the next minor version. The existing infrastructure manifests are stored in the Cloud Source Repository '{{NAMESPACE}}-repo'.
  
  Before triggering the live cluster upgrade, you must guarantee that no workloads will be broken by removed or deprecated APIs. Use the 'upgrade-audit.sh' script in the repository to audit the existing manifests. 
  
  To ensure absolute safety, you must strictly validate any manifest modifications by provisioning a temporary, ephemeral GKE cluster at the target version and successfully deploying the workloads there. Only after the validation environment is proven functional should you apply the changes to production and proceed with the rolling version upgrade.
  
  Once the upgrade is complete, verify the health of the cluster and write a status report to 'production-readiness.md'.
expected_output: |
  critical requirements:
  - Agent runs the audit script to identify deprecated API usage.
  - Agent clones the Cloud Source Repository containing the manifests.
  - Agent updates the deprecated APIs in the manifests to their stable equivalents, and commits/pushes the changes back to the repository.
  - Agent provisions a temporary GKE cluster at the target version.
  - Agent successfully deploys the updated manifests to the temporary cluster to validate compatibility.
  - Agent tears down the temporary validation cluster after successful testing.
  - Agent applies the updated manifests to the production cluster prior to the upgrade.
  - Agent upgrades the production GKE cluster master and node pools to the new target version.
  - Agent verifies that all workloads in the upgraded production cluster are healthy and no pods are pending/crashing.
  - Agent writes the final cluster status and health verification to 'production-readiness.md'.
