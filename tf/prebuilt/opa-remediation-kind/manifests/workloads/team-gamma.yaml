apiVersion: v1
kind: Namespace
metadata:
  name: team-gamma
  labels:
    owner: gamma-team
    env: non-prod
---
# VIOLATION (governance): no resource limits
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: team-gamma
  labels:
    app: worker
    owner: gamma-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "while true; do sleep 3600; done"]
---
# COMPLIANT (control / noise): not privileged, has limits — should NOT be flagged.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: team-gamma
  labels:
    app: api
    owner: gamma-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: nginx:1.25
          securityContext:
            privileged: false
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
