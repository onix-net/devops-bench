# Seeded fixture for tasks/common/ledger-read-facade. Hand-maintained,
# applied via raw `kubectl apply -f` (no templating), so every object below
# hardcodes namespace: ledger.
#
# THE SEEDED FAULT lives on the ledger-facade Deployment: the container sets
# readOnlyRootFilesystem: true but mounts no writable emptyDir volumes, so
# nginx cannot write its pidfile (/var/run) or its cache/temp paths
# (/var/cache/nginx, /tmp) and crash-loops. The agent's job is to add
# writable emptyDir mounts for those three paths while keeping
# readOnlyRootFilesystem true.
---
apiVersion: v1
kind: Namespace
metadata:
  name: ledger
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ledger-facade-sa
  namespace: ledger
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ledger-balance-config
  namespace: ledger
data:
  current-snapshot: "current-balance-4821990-55"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ledger-facade-nginx
  namespace: ledger
data:
  nginx.conf: |
    worker_processes 1;
    pid /var/run/nginx.pid;
    events { worker_connections 1024; }
    http {
      server {
        listen 8080;
        location / { proxy_pass http://ledger-balance:80; }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-balance
  namespace: ledger
  labels:
    app: ledger-balance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ledger-balance
  template:
    metadata:
      labels:
        app: ledger-balance
    spec:
      containers:
        - name: ledger-balance
          image: hashicorp/http-echo:1.0
          args: ["-text=$(BALANCE)", "-listen=:5678"]
          env:
            - name: BALANCE
              valueFrom:
                configMapKeyRef:
                  name: ledger-balance-config
                  key: current-snapshot
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-balance
  namespace: ledger
spec:
  type: ClusterIP
  selector:
    app: ledger-balance
  ports:
    - port: 80
      targetPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-facade
  namespace: ledger
  labels:
    app: ledger-facade
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ledger-facade
  template:
    metadata:
      labels:
        app: ledger-facade
    spec:
      serviceAccountName: ledger-facade-sa
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        # SEEDED FAULT: readOnlyRootFilesystem is true but no writable
        # emptyDir volumes are mounted below (no /var/run, /var/cache/nginx,
        # or /tmp). nginx cannot write its pidfile/temp paths and
        # crash-loops. Fix by adding writable emptyDir mounts for those
        # three paths; do not flip readOnlyRootFilesystem to false.
        - name: ledger-facade
          image: nginxinc/nginx-unprivileged:1.27-alpine
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: ledger-facade-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-facade
  namespace: ledger
spec:
  type: ClusterIP
  selector:
    app: ledger-facade
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ledger-facade
  namespace: ledger
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /ledger/balance
            pathType: Prefix
            backend:
              service:
                name: ledger-facade
                port:
                  number: 80
---
# Distractor: correct terminal state is replicas: 0. The agent must leave
# this alone.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-report-batch
  namespace: ledger
  labels:
    app: ledger-report-batch
spec:
  replicas: 0
  selector:
    matchLabels:
      app: ledger-report-batch
  template:
    metadata:
      labels:
        app: ledger-report-batch
    spec:
      containers:
        - name: batch
          image: busybox:1.36
          command: ["sleep", "3600"]
---
# Distractor: correct terminal state is a Completed Job. The agent must
# leave this alone.
apiVersion: batch/v1
kind: Job
metadata:
  name: ledger-migrate-once
  namespace: ledger
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: busybox:1.36
          command: ["true"]
