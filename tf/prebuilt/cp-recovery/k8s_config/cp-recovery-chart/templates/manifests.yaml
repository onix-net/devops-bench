apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cp-recovery-setup-admin
  namespace: {{ .Values.namespace }}
subjects:
- kind: ServiceAccount
  name: cp-recovery-setup-sa
  namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-config
  namespace: {{ .Values.namespace }}
data:
  block-mutating-requests: "false"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-status
  namespace: {{ .Values.namespace }}
data:
  status: "Healthy"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitops-state
  namespace: {{ .Values.namespace }}
data:
  workloads: |
    - name: workload-1
      image: nginx:latest
    - name: workload-2
      image: redis:latest
    - name: workload-3
      image: memcached:latest
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apiserver-script
  namespace: {{ .Values.namespace }}
data:
  apiserver.py: |
{{ .Files.Get "files/apiserver.py" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: etcd-headless
  namespace: {{ .Values.namespace }}
  labels:
    app: etcd
spec:
  ports:
  - name: client
    port: 2379
    targetPort: 2379
  - name: peer
    port: 2380
    targetPort: 2380
  clusterIP: None
  selector:
    app: etcd
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: {{ .Values.namespace }}
spec:
  serviceName: etcd-headless
  replicas: 3
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
      - name: etcd
        image: gcr.io/etcd-development/etcd:v3.5.11
        env:
        - name: ETCD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: ETCD_DATA_DIR
          value: "/etcd-data"
        - name: ETCD_INITIAL_CLUSTER_TOKEN
          value: "etcd-cluster-token"
        - name: ETCD_INITIAL_CLUSTER
          value: "etcd-0=http://etcd-0.etcd-headless:2380,etcd-1=http://etcd-1.etcd-headless:2380,etcd-2=http://etcd-2.etcd-headless:2380"
        - name: ETCD_INITIAL_CLUSTER_STATE
          value: "new"
        - name: ETCD_LISTEN_PEER_URLS
          value: "http://0.0.0.0:2380"
        - name: ETCD_LISTEN_CLIENT_URLS
          value: "http://0.0.0.0:2379"
        - name: ETCD_ADVERTISE_CLIENT_URLS
          value: "http://$(ETCD_NAME).etcd-headless:2379"
        - name: ETCD_INITIAL_ADVERTISE_PEER_URLS
          value: "http://$(ETCD_NAME).etcd-headless:2380"
        ports:
        - name: client
          containerPort: 2379
        - name: peer
          containerPort: 2380
        volumeMounts:
        - name: data
          mountPath: /etcd-data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-apiserver
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-apiserver
  template:
    metadata:
      labels:
        app: mock-apiserver
    spec:
      containers:
      - name: apiserver
        image: python:3.11-slim
        command: ["python3", "/app/apiserver.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: script-volume
          mountPath: /app
        - name: config-volume
          mountPath: /config/control-plane-config
        - name: status-volume
          mountPath: /config/control-plane-status
      volumes:
      - name: script-volume
        configMap:
          name: apiserver-script
      - name: config-volume
        configMap:
          name: control-plane-config
      - name: status-volume
        configMap:
          name: control-plane-status
---
apiVersion: v1
kind: Service
metadata:
  name: mock-apiserver
  namespace: {{ .Values.namespace }}
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: mock-apiserver
