apiVersion: batch/v1
kind: Job
metadata:
  name: setup-and-corrupt
  namespace: {{ .Values.namespace }}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        job-name: setup-and-corrupt
    spec:
      serviceAccountName: cp-recovery-setup-sa
      containers:
      - name: setup-script
        image: google/cloud-sdk:slim
        command: ["/bin/bash", "/scripts/setup-and-corrupt.sh"]
        env:
        - name: GCS_BUCKET_NAME
          value: {{ .Values.etcdBackupBucket }}
        - name: NAMESPACE
          value: {{ .Values.namespace }}
        volumeMounts:
        - name: scripts-volume
          mountPath: /scripts
        - name: corruptor-volume
          mountPath: /corruptor
      restartPolicy: Never
      volumes:
      - name: scripts-volume
        configMap:
          name: setup-scripts-configmap
          defaultMode: 0777
      - name: corruptor-volume
        configMap:
          name: corruptor-yaml-configmap
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: setup-scripts-configmap
  namespace: {{ .Values.namespace }}
data:
  setup-and-corrupt.sh: |
{{ .Files.Get "files/setup-and-corrupt.sh" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: corruptor-yaml-configmap
  namespace: {{ .Values.namespace }}
data:
  corruptor.yaml: |
{{ .Files.Get "files/corruptor.yaml" | replace "{{NAMESPACE}}" .Values.namespace | indent 4 }}
